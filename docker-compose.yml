services:
  chroma:
    image: chromadb/chroma:latest
    container_name: cogniflow-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    restart: unless-stopped

  api:
    build: .
    container_name: cogniflow-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8501"
      CHROMA_SERVER_HOST: chroma
      CHROMA_SERVER_PORT: "8000"
      SQLITE_DB_PATH: /app/data/memory.db
      CHECKPOINT_SQLITE_PATH: /app/data/checkpoints.db
      CHAT_RESPONSE_CACHE_SQLITE_PATH: /app/data/response_cache.db
    volumes:
      - cogniflow_data:/app/data
    depends_on:
      - chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  streamlit:
    build: .
    container_name: cogniflow-ui
    command:
      [
        "streamlit",
        "run",
        "streamlit_app.py",
        "--server.port",
        "8501",
        "--server.address",
        "0.0.0.0",
      ]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8501"
      API_BASE_URL: http://api:8000
      SQLITE_DB_PATH: /app/data/memory.db
    volumes:
      - cogniflow_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cogniflow_data:
  chroma_data:
